services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: creova
      POSTGRES_USER: creova
      POSTGRES_PASSWORD: creova
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creova -d creova"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: creova
      MINIO_ROOT_PASSWORD: change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 creova change-me; do sleep 1; done;
      mc mb --ignore-existing local/creova-assets;
      exit 0;
      "

  api:
    build: .
    profiles: ["app"]
    env_file: .env
    command: creova-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    profiles: ["app"]
    env_file: .env
    command: creova-worker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
